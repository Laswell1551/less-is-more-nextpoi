name: poi
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      # Install the CUDA 12.4 wheel of PyTorch (see README); CPU works but is slow:
      #   pip install torch==2.6.0 --index-url https://download.pytorch.org/whl/cu124
      - torch>=2.2
      - numpy>=1.26
      - pandas>=2.2
      - scipy>=1.13
      - scikit-learn>=1.5
      - matplotlib>=3.9
      - tqdm>=4.66
      - pyarrow
